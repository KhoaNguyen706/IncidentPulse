# nginx-only dev proxy when Spring Boot + Vite run on the host (not in Docker).
#
# Terminal 1:  docker compose up -d db redis && ./mvnw spring-boot:run
# Terminal 2:  cd frontend && npm run dev
# Terminal 3:  docker compose -f docker-compose.nginx-dev.local.yml up -d
#
# Open http://localhost:8888  — nginx forwards /api and /ws to :8080, UI to :5173.
#
services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.dev.local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
