# Production reverse proxy + static frontend (built into the nginx image).
# Upstream "app" is the Spring Boot service on the Docker network.

upstream spring_backend {
    server app:8080;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # --- Spring Boot API ---------------------------------------------------
    location /api/ {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # STOMP / SockJS (includes /ws/info, /ws/websocket, etc.)
    location /ws {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
        include /etc/nginx/snippets/proxy-websocket.conf;
    }

    # --- Swagger + Actuator (optional but handy in demos) ------------------
    location /swagger-ui/ {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    location = /swagger-ui.html {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    location /v3/api-docs {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    location /actuator/ {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # --- React SPA (client-side routes) ------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
