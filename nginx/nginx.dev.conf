# Development reverse proxy — all services on the Docker Compose network.
# Single entry point: http://localhost  (port 80)
#
#   /api, /ws, /swagger-ui, /actuator  →  Spring Boot (app:8080)
#   everything else                     →  Vite dev server (frontend:5173)
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d --build

upstream spring_backend {
    server app:8080;
}

upstream vite_dev {
    server frontend:5173;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # --- Backend routes ----------------------------------------------------
    location /api/ {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    location /ws {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
        include /etc/nginx/snippets/proxy-websocket.conf;
    }

    location /swagger-ui/ {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    location = /swagger-ui.html {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    location /v3/api-docs {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    location /actuator/ {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    # --- Vite dev server (HMR + static) ----------------------------------
    location / {
        proxy_pass http://vite_dev;
        include /etc/nginx/snippets/proxy-backend.conf;
        include /etc/nginx/snippets/proxy-websocket.conf;
    }
}
