# Development reverse proxy when Spring Boot + Vite run on the HOST machine.
# nginx runs in Docker and reaches the host via host.docker.internal.
#
# Single entry point: http://localhost:8888
#
#   docker compose -f docker-compose.nginx-dev.local.yml up -d

upstream spring_backend {
    server host.docker.internal:8080;
}

upstream vite_dev {
    server host.docker.internal:5173;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    location /ws {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
        include /etc/nginx/snippets/proxy-websocket.conf;
    }

    location /swagger-ui/ {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    location = /swagger-ui.html {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    location /v3/api-docs {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    location /actuator/ {
        proxy_pass http://spring_backend;
        include /etc/nginx/snippets/proxy-backend.conf;
    }

    location / {
        proxy_pass http://vite_dev;
        include /etc/nginx/snippets/proxy-backend.conf;
        include /etc/nginx/snippets/proxy-websocket.conf;
    }
}
