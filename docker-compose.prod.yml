# Production stack for a single host (e.g. AWS EC2 t2.micro, 1 GB RAM).
# All secrets come from a .env file next to this one (see .env.example).
# Memory limits + JVM caps are sized to fit 1 GB; add 1-2 GB swap on the host.
#
# nginx on :80 serves the React build and proxies /api + /ws to Spring Boot.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-incidentpulse}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      # Postgres 18+ expects the mount at /var/lib/postgresql (not .../data).
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-incidentpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "48mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64m

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-incidentpulse}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost}
      # Cap the heap so the JVM fits comfortably on a 1 GB box.
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xss512k -XX:MaxMetaspaceSize=128m"
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 512m

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          memory: 48m

volumes:
  db-data:
