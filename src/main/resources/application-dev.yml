# Local development. Flyway owns the schema (same as prod) so migrations are
# exercised on every run; Hibernate only validates. Verbose SQL logging is on
# to make learning/debugging easy.
spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
