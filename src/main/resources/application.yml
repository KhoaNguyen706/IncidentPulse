# Shared configuration (12-factor: values come from env vars, NO secrets here).
# Profile-specific overrides live in application-{dev,prod,test}.yml.
# Active profile defaults to "dev"; set SPRING_PROFILES_ACTIVE=prod in production.
server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: Incident Pulse
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/incidentpulse}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    # Don't keep a DB session open during view rendering; transactions are
    # explicit at the service layer instead. Avoids accidental lazy-load N+1.
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Actuator - expose only what you need.
management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  email:
    # Fallback recipient when an incident has no assignee email.
    default-recipient: ${APP_EMAIL_DEFAULT_RECIPIENT:}
  admin:
    # Seeded only when no user with this username exists yet.
    username: ${APP_ADMIN_USERNAME:admin}
    email: ${APP_ADMIN_EMAIL:admin@incidentpulse.local}
    password: ${APP_ADMIN_PASSWORD:admin123}
  rate-limit:
    login:
      capacity: ${RATE_LIMIT_LOGIN_CAPACITY:5}
      refill-tokens: ${RATE_LIMIT_LOGIN_REFILL_TOKENS:1}
      refill-period-minutes: ${RATE_LIMIT_LOGIN_REFILL_PERIOD_MINUTES:3}
  webhook:
    # Shared secret external monitors send in the X-API-Key header.
    # Empty = webhook ingestion disabled (fails closed). Set in production.
    api-key: ${WEBHOOK_API_KEY:}

auth:
  refresh:
    days: ${AUTH_REFRESH_DAYS:14}

security:
  jwt:
    # Generate with: openssl rand -base64 32
    secretBase64: ${JWT_SECRET:CHANGE_ME_BASE64_AT_LEAST_32_BYTES_CHANGE_ME}
    issuer: ${JWT_ISSUER:incidentpulse}
    audience: ${JWT_AUDIENCE:incidentpulse-api}
    accessTokenMinutes: ${JWT_ACCESS_MINUTES:15}
