# Full dev stack with nginx as the single entry point (port 80).
# Frontend (Vite), API, and WebSocket all share one origin — no CORS needed.
#
#   docker compose -f docker-compose.dev.yml up -d --build
#   open http://localhost
#
services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: incidentpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      # Postgres 18+ expects the mount at /var/lib/postgresql (not .../data).
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d incidentpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/incidentpulse
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_CORS_ORIGINS: http://localhost,http://localhost:5173,http://127.0.0.1,http://127.0.0.1:5173
      # Valid base64 secret for local dev (matches test profile; do not use in prod).
      JWT_SECRET: TzYgDrjAYIKLYuQm/sOFo/O2hldY8yFu67NV8WaDA+9NhHldVc9eRVF4WwUjIMtC
    # Not exposed to the host — nginx is the only public entry point.
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      # Vite dev proxy must reach Spring Boot on the compose network, not localhost.
      VITE_DEV_PROXY_TARGET: http://app:8080
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    expose:
      - "5173"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
    restart: unless-stopped

volumes:
  db-data:
  frontend-node-modules:
